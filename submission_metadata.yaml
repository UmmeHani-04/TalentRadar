  - "Claude"

ai_usage_summary: |
  Used Antigravity (an AI coding assistant) for architecture design, code generation,
  and code review across all modules. Used Claude for approach discussion.
  No candidate data was fed to any external LLM at any stage.
  The ranker itself is fully offline — no API calls during ranking.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Five-dimensional candidate ranker combining rule-based signals and semantic
  embeddings. The system uses a two-pass architecture for scalability:

  Pass 1 — Fast rule-based pre-filter across all 100K+ candidates:
    (1) Skill Score (30%): Hard skill match against JD taxonomy with proficiency
        weighting (expert=1.0 down to beginner=0.3), endorsement boost, duration
        trust, cluster-based fuzzy matching, and hidden-requirement inference.
    (2) Experience Score (15%): Asymmetric penalty — sharp falloff for under-
        experience (15 pts/yr), gentle falloff for over-experience (5 pts/yr).
    (3) Career Score (15%): Title progression ladder, industry relevance, product
        vs. services company weighting (pure services career penalized 0.4x per JD),
        and job-hopping detection.
    (4) Behavior Score (10%): Redrob signals composite — recruiter response rate,
        GitHub activity, profile completeness, recency, and verification status.
  Top 5,000 candidates retained for Pass 2.

  Pass 2 — Semantic scoring via sentence-transformers (all-MiniLM-L6-v2):
    (5) Semantic Score (30%): Cosine similarity between JD embedding and
        candidate profile text (headline + summary + skills + career).
  Final 5-dimension weighted score → top 100 output with explainable reasoning.

  Runtime: ~4–5 minutes for 100K candidates on 12-core CPU, 15GB RAM.

